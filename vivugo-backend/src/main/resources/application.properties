spring.profiles.active=${SPRING_PROFILES_ACTIVE:aws}
server.port=${SERVER_PORT:8081}

# PostgreSQL Database
# AWS mode expects DB_URL, DB_USERNAME and DB_PASSWORD to be provided by environment variables.
# Example DB_URL: jdbc:postgresql://your-rds-endpoint.amazonaws.com:5432/vivugo_db?sslmode=require
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret-key=${JWT_SECRET_KEY:vivugo-secret-key-vivugo-secret-key-vivugo-secret-key-123456}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
jwt.customer.secret-key=${JWT_CUSTOMER_SECRET_KEY:vivugo-customer-secret-key-vivugo-customer-secret-key-123456}
jwt.admin.secret-key=${JWT_ADMIN_SECRET_KEY:vivugo-admin-secret-key-vivugo-admin-secret-key-123456}

# AI config
ai.api.key=${AI_API_KEY:your_openrouter_api_key}
ai.model=${AI_MODEL:openai/gpt-4o-mini}

# Redis
#spring.data.redis.host=localhost
#spring.data.redis.port=6379

# Mail config
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:${EMAIL_USER:your_email@gmail.com}}
spring.mail.password=${MAIL_PASSWORD:${EMAIL_PASS:your_app_password}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

spring.cache.type=none
spring.data.redis.repositories.enabled=false
management.health.redis.enabled=false
management.health.mail.enabled=false
management.endpoint.health.show-details=always

app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
app.asset-fallback-base-url=${ASSET_FALLBACK_BASE_URL:http://localhost:5173}
sepay.api-token=${SEPAY_API_TOKEN:}
sepay.account-number=${SEPAY_ACCOUNT_NUMBER:}
