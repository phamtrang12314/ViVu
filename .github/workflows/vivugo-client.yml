name: ViVuGo Client CI

on:
  push:
    paths:
      - "vivugo-client/**"
      - ".github/workflows/vivugo-client.yml"
  pull_request:
    paths:
      - "vivugo-client/**"
      - ".github/workflows/vivugo-client.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vivugo-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vivugo-client/package-lock.json
      - run: npm ci
      - run: npm run build
