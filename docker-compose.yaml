name: vivugo

services:
  redis:
    image: redis:7-alpine
    container_name: vivugo-redis
    ports:
      - "6379:6379"

  backend:
    build: ./vivugo-backend
    container_name: vivugo-backend
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-aws}
      DB_URL: ${DB_URL:?DB_URL must be the AWS RDS PostgreSQL JDBC URL}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SPRING_CACHE_TYPE: ${SPRING_CACHE_TYPE:-redis}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      MANAGEMENT_HEALTH_REDIS_ENABLED: "true"
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-your_email@gmail.com}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-your_app_password}
    depends_on:
      redis:
        condition: service_started

  client:
    build: ./vivugo-client
    container_name: vivugo-client
    ports:
      - "5173:80"
    depends_on:
      - backend

  admin:
    build: ./vivugo-admin
    container_name: vivugo-admin
    ports:
      - "5174:80"
    depends_on:
      - backend
