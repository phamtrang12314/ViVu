name: vivugo-prod

services:
  backend:
    build:
      context: ./vivugo-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8081}:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: ${SERVER_PORT:-8081}
      DB_URL: ${DB_URL:?Set DB_URL in your production env file}
      DB_USERNAME: ${DB_USERNAME:?Set DB_USERNAME in your production env file}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in your production env file}
      HIBERNATE_DDL_AUTO: ${HIBERNATE_DDL_AUTO:-update}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in your production env file}
      JWT_CUSTOMER_SECRET_KEY: ${JWT_CUSTOMER_SECRET_KEY:?Set JWT_CUSTOMER_SECRET_KEY in your production env file}
      JWT_ADMIN_SECRET_KEY: ${JWT_ADMIN_SECRET_KEY:?Set JWT_ADMIN_SECRET_KEY in your production env file}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:?Set frontend domains in CORS_ALLOWED_ORIGIN_PATTERNS}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:?Set MAIL_USERNAME in your production env file}
      MAIL_PASSWORD: ${MAIL_PASSWORD:?Set MAIL_PASSWORD in your production env file}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-openai/gpt-4o-mini}

  client:
    build:
      context: ./vivugo-client
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?Set VITE_API_BASE_URL in your production env file}
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-80}:80"
    depends_on:
      - backend

  admin:
    build:
      context: ./vivugo-admin
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?Set VITE_API_BASE_URL in your production env file}
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-8080}:80"
    depends_on:
      - backend
